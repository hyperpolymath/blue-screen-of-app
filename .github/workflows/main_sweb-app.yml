# SPDX-License-Identifier: MPL-2.0
# Azure deployment (Deno-based)
name: Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions: read-all

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2.0.2
        with:
          deno-version: v1.x

      - name: Build
        run: |
          cat > config.json <<'EOF'
          {"server":{"port":8080},"app":{"name":"BSOD"}}
          EOF
          deno cache src/server.js

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: deno-app
          path: |
            src/
            config.json
            deno.json

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: deno-app

      - uses: azure/webapps-deploy@02a81bead70021f5284939794bcec79c271ab383 # v3.0.2
        id: deploy-to-webapp
        with:
          app-name: 'sweb-app'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_886E1A580FA745B6BF6A2700A3C4197A }}
          package: .
